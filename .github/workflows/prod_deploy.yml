name: Production Deployment

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Lowercase Repository Name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN  }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Backend Image
        run: |
          docker build -t ghcr.io/${{ env.REPO_LOWER }}/hireit-backend-prod:latest ./backend
          docker push ghcr.io/${{ env.REPO_LOWER }}/hireit-backend-prod:latest

  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Lowercase Repository Name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Frontend Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.PROD_NEXT_PUBLIC_API_URL}} \
            --build-arg NEXT_PUBLIC_API_PORT=${{ vars.PROD_NEXT_PUBLIC_API_PORT || '8080' }} \
            -t ghcr.io/${{ env.REPO_LOWER }}/hireit-frontend-prod:latest ./frontend
          docker push ghcr.io/${{ env.REPO_LOWER }}/hireit-frontend-prod:latest

  deploy:
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: [self-hosted, prod]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 
        with:
          ref: main

      - name: Lowercase Repository Name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Create HireIt Network
        run: docker network create hireit-network || true

      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy Backend
        run: |
          docker pull ghcr.io/${{ env.REPO_LOWER }}/hireit-backend-prod:latest
          docker stop hireit-backend-prod || true
          docker rm hireit-backend-prod || true
          docker run -d \
            --name hireit-backend-prod \
            --network hireit-network \
            -p 8080:8080 \
            -e APP_ENV=production \
            -e MONGO_URI="${{ secrets.PROD_MONGO_URI }}" \
            -e JWT_SECRET="${{ secrets.PROD_JWT_SECRET }}" \
            -e GOOGLE_CLIENT_ID="${{ vars.PROD_GOOGLE_CLIENT_ID }}" \
            -e GOOGLE_CLIENT_SECRET="${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}" \
            -e GOOGLE_REDIRECT_URL="${{ vars.PROD_GOOGLE_REDIRECT_URL }}" \
            -e TELEGRAM_BOT_TOKEN="${{ secrets.PROD_TELEGRAM_BOT_TOKEN }}" \
            -e TELEGRAM_CHAT_ID="${{ vars.PROD_TELEGRAM_CHAT_ID }}" \
            -e RABBITMQ_URL="${{ secrets.PROD_RABBITMQ_URL }}" \
            -e RABBITMQ_QUEUE="candidate_details" \
            -e FRONTEND_URL="${{ vars.PROD_FRONTEND_URL }}" \
            -e AUDIT_LOG_COLLECTION="audit_logs" \
            -e MSG91_BASE_URL="${{ vars.PROD_MSG91_BASE_URL }}" \
            -e MSG91_TEMPLATE_ID="${{ vars.PROD_MSG91_TEMPLATE_ID }}" \
            -e MSG91_AUTH_KEY="${{ secrets.PROD_MSG91_AUTH_KEY }}" \
            --restart unless-stopped \
            ghcr.io/${{ env.REPO_LOWER }}/hireit-backend-prod:latest

      - name: Deploy Frontend
        run: |
          docker pull ghcr.io/${{ env.REPO_LOWER }}/hireit-frontend-prod:latest
          docker stop hireit-frontend-prod || true
          docker rm hireit-frontend-prod || true
          docker run -d \
            --name hireit-frontend-prod \
            --network hireit-network \
            -p 3000:3000 \
            --restart unless-stopped \
            ghcr.io/${{ env.REPO_LOWER }}/hireit-frontend-prod:latest

      - name: Create Monitoring Env File
        run: |
          printf 'ALERT_EMAIL_FROM=%s\n' "${{ secrets.ALERT_EMAIL_FROM }}" > .env.monitoring
          printf 'ALERT_EMAIL_PASSWORD=%s\n' "${{ secrets.ALERT_EMAIL_PASSWORD }}" >> .env.monitoring
          printf 'ALERT_EMAIL_TO=%s\n' "${{ vars.ALERT_EMAIL_TO }}" >> .env.monitoring
          printf 'GF_SECURITY_ADMIN_PASSWORD=%s\n' "${{ secrets.PROD_GRAFANA_PASSWORD }}" >> .env.monitoring

      - name: Deploy Monitoring Stack
        run: |
          # Force remove all old monitoring containers (including old hash-prefixed names)
          docker ps -a --format '{{.Names}}' | grep -E 'prometheus|grafana|alertmanager' | xargs -r docker rm -f

          # Pull latest images
          docker pull prom/prometheus:latest
          docker pull grafana/grafana:latest
          docker pull prom/alertmanager:latest

          # Start Prometheus
          docker run -d \
            --name hireit-prometheus \
            --network hireit-network \
            -p 9090:9090 \
            -v $(pwd)/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
            -v $(pwd)/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml \
            -v hireit_prometheus_data:/prometheus \
            --restart unless-stopped \
            prom/prometheus:latest \
            --config.file=/etc/prometheus/prometheus.yml \
            --storage.tsdb.path=/prometheus

          # Start Grafana
          docker run -d \
            --name hireit-grafana \
            --network hireit-network \
            -p 3001:3000 \
            -v hireit_grafana_data:/var/lib/grafana \
            -e GF_SECURITY_ADMIN_PASSWORD="$(grep GF_SECURITY_ADMIN_PASSWORD .env.monitoring | cut -d= -f2-)" \
            -e GF_SERVER_ROOT_URL='%(protocol)s://%(domain)s/grafana/' \
            -e GF_SERVER_SERVE_FROM_SUB_PATH=true \
            --restart unless-stopped \
            grafana/grafana:latest

          # Start Alertmanager with envsubst
          ALERT_EMAIL_FROM=$(grep ALERT_EMAIL_FROM .env.monitoring | cut -d= -f2-)
          ALERT_EMAIL_PASSWORD=$(grep ALERT_EMAIL_PASSWORD .env.monitoring | cut -d= -f2-)
          ALERT_EMAIL_TO=$(grep ALERT_EMAIL_TO .env.monitoring | cut -d= -f2-)
          export ALERT_EMAIL_FROM ALERT_EMAIL_PASSWORD ALERT_EMAIL_TO
          envsubst < prometheus/alertmanager.yml > /tmp/alertmanager.yml
          docker run -d \
            --name hireit-alertmanager \
            --network hireit-network \
            -p 9093:9093 \
            -v /tmp/alertmanager.yml:/etc/alertmanager/alertmanager.yml \
            --restart unless-stopped \
            prom/alertmanager:latest \
            --config.file=/etc/alertmanager/alertmanager.yml

      - name: Prune Dangling Images
        run: docker image prune -f
