name: Development Deployment

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Lowercase Repository Name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Backend Image
        run: |
          docker build -t ghcr.io/${{ env.REPO_LOWER }}/hireit-backend-dev:latest ./backend
          docker push ghcr.io/${{ env.REPO_LOWER }}/hireit-backend-dev:latest

  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Lowercase Repository Name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Frontend Image
        run: |
          docker build --no-cache \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.DEV_NEXT_PUBLIC_API_URL}} \
            -t ghcr.io/${{ env.REPO_LOWER }}/hireit-frontend-dev:latest ./frontend
          docker push ghcr.io/${{ env.REPO_LOWER }}/hireit-frontend-dev:latest

  deploy:
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: [self-hosted, dev]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Lowercase Repository Name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Create HireIt Network
        run: docker network create hireit-network || true

      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy Backend
        run: |
          docker pull ghcr.io/${{ env.REPO_LOWER }}/hireit-backend-dev:latest
          docker stop hireit-backend-dev || true
          docker rm hireit-backend-dev || true
          docker run -d \
            --name hireit-backend-dev \
            --network hireit-network \
            -p 8080:8080 \
            -e APP_ENV=development \
            -e MONGO_URI="${{ secrets.DEV_MONGO_URI }}" \
            -e JWT_SECRET="${{ secrets.DEV_JWT_SECRET }}" \
            -e GOOGLE_CLIENT_ID="${{ vars.DEV_GOOGLE_CLIENT_ID }}" \
            -e GOOGLE_CLIENT_SECRET="${{ secrets.DEV_GOOGLE_CLIENT_SECRET }}" \
            -e GOOGLE_REDIRECT_URL="${{ vars.DEV_GOOGLE_REDIRECT_URL }}" \
            -e TELEGRAM_BOT_TOKEN="${{ secrets.DEV_TELEGRAM_BOT_TOKEN }}" \
            -e TELEGRAM_CHAT_ID="${{ vars.DEV_TELEGRAM_CHAT_ID }}" \
            -e RABBITMQ_URL="${{ secrets.DEV_RABBITMQ_URL }}" \
            -e RABBITMQ_QUEUE="candidate_details" \
            -e RABBITMQ_RESULT_QUEUE="${{ secrets.DEV_RABBITMQ_RESULT_QUEUE }}" \
            -e FRONTEND_URL="${{ vars.DEV_FRONTEND_URL }}" \
            -e AUDIT_LOG_COLLECTION="audit_logs" \
            -e MSG91_BASE_URL="${{ vars.DEV_MSG91_BASE_URL }}" \
            -e MSG91_TEMPLATE_ID="${{ vars.DEV_MSG91_TEMPLATE_ID }}" \
            -e MSG91_AUTH_KEY="${{ secrets.DEV_MSG91_AUTH_KEY }}" \
            --restart unless-stopped \
            ghcr.io/${{ env.REPO_LOWER }}/hireit-backend-dev:latest

      - name: Deploy Frontend
        run: |
          docker pull ghcr.io/${{ env.REPO_LOWER }}/hireit-frontend-dev:latest
          docker stop hireit-frontend-dev || true
          docker rm hireit-frontend-dev || true
          docker run -d \
            --name hireit-frontend-dev \
            --network hireit-network \
            -p 3000:3000 \
            --restart unless-stopped \
            ghcr.io/${{ env.REPO_LOWER }}/hireit-frontend-dev:latest

      - name: Create Monitoring Env File
        run: |
          printf 'ALERT_EMAIL_FROM=%s\n' "${{ secrets.ALERT_EMAIL_FROM }}" > .env.monitoring
          printf 'ALERT_EMAIL_PASSWORD=%s\n' "${{ secrets.ALERT_EMAIL_PASSWORD }}" >> .env.monitoring
          printf 'ALERT_EMAIL_TO=%s\n' "${{ vars.ALERT_EMAIL_TO }}" >> .env.monitoring
          printf 'GF_SECURITY_ADMIN_PASSWORD=%s\n' "${{ secrets.DEV_GRAFANA_PASSWORD }}" >> .env.monitoring

      - name: Deploy Monitoring Stack
        run: |
          docker stop hireit-prometheus hireit-grafana hireit-alertmanager 2>/dev/null || true
          docker rm hireit-prometheus hireit-grafana hireit-alertmanager 2>/dev/null || true
          docker-compose -f docker-compose.monitoring.yml up -d

      - name: Prune Dangling Images
        run: docker image prune -f
