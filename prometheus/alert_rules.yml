groups:
  - name: hireit_alerts
    rules:
      # Backend instance is down
      - alert: BackendDown
        expr: up{job="hireit-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "HireIt backend is DOWN"
          description: "Instance {{ $labels.instance }} has been down for more than 1 minute."

      # High HTTP error rate (>5% 5xx errors)
      - alert: HighErrorRate
        expr: |
          rate(hireit_http_requests_total{status=~"5.."}[5m])
          / rate(hireit_http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.instance }}"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      # Slow P95 response time (>1s)
      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95,
            rate(hireit_http_request_duration_seconds_bucket[5m])
          ) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Slow P95 response time on {{ $labels.instance }}"
          description: "P95 latency is {{ $value | humanizeDuration }}."

      # High request rate (>100 req/s)
      - alert: HighRequestRate
        expr: rate(hireit_http_requests_total[1m]) > 100
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High request rate on {{ $labels.instance }}"
          description: "Request rate is {{ $value | humanize }} req/s."
