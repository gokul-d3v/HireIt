global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: '${ALERT_EMAIL_FROM}'
  smtp_auth_username: '${ALERT_EMAIL_FROM}'
  smtp_auth_password: '${ALERT_EMAIL_PASSWORD}'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'email'

receivers:
  - name: 'email'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true
        html: |
          <h2>🚨 {{ .CommonLabels.alertname }}</h2>
          {{ range .Alerts }}
          <p><b>Status:</b> {{ .Status | toUpper }}</p>
          <p><b>Summary:</b> {{ .Annotations.summary }}</p>
          <p><b>Details:</b> {{ .Annotations.description }}</p>
          <hr>
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
